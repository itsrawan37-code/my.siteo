<!DOCTYPE html>

<title>Happy Birthday 💖</title>

<style>
body {
    font-family: 'cairo', sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #ff758c, #ffb199);
    text-align: center;
    color: white;
    overflow: hidden;
}
h1 {
    font-family: 'cairo', serif;
    font-weight: 800;
    letter-spacing: 1px;
}
    p {
    font-family: 'cairo', sans-serif;
    font-size: 30px;
    line-height: 1.6;
}
button {
    font-family:'Playfair Display', serif ;
    font-weight: 600;
    margin-top: 20px;
    padding: 10px 25px;
    border: none;
    border-radius: 20px;
    background: white;
    color: #ff4d6d;
    cursor: pointer;
    transition: 0.3s;
}
.back-btn {
    position: fixed;
    bottom: 30px;   /* 👈 المسافة من تحت */
    left: 50%;
    transform: translateX(-50%);
    
    padding: 12px 30px;
    border-radius: 25px;
    background: #eee;
    color: #ff4d6d;
}
.back-btn:hover {
    background: #ff4d6d;
    color: white;
    transform: scale(1.05);
}
/* الكونتينر */
.photo-section {
    position: relative;
    width: 100%;
    max-width: 600px;
    height: 400px;
    margin: 40px auto;
}

/* كل صورة */
.photo {
    position: absolute;
    width: 120px;
    height: 150px;
    overflow: hidden;
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);

    opacity: 0;
    transform: translateY(-100px) rotate(0deg);
    animation: drop 1s forwards;
}

/* الصورة نفسها */
.photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* توزيع عشوائي */
.photo:nth-child(1) {
    left: 10%;
    top: 15%;
    transform: rotate(-10deg);
    animation-delay: 0.3s;
}

.photo:nth-child(2) {
    left: 40%;
    top: 10%;
    transform: rotate(8deg);
    animation-delay: 0.6s;
}

.photo:nth-child(3) {
    left: 70%;
    top: 30%;
    transform: rotate(-5deg);
    animation-delay: 0.9s;
}

.photo:nth-child(4) {
    left: 15%;
    top: 50%;
    transform: rotate(6deg);
    animation-delay: 1.2s;
}

.photo:nth-child(5) {
    left: 60%;
    top: 55%;
    transform: rotate(-8deg);
    animation-delay: 1.5s;
}
.back-btn {
    z-index: 9999;
}
/* حركة النزول */
@keyframes drop {
    to {
        opacity: 1;
        transform: translateY(0) rotate(var(--rotate, 0deg));
    }
}

/* حركة لما الماوس ييجي */
.photo:hover {
    transform: scale(1.1) rotate(0deg) !important;
    z-index: 10;
}

/* 📱 موبايل */
@media (max-width: 600px) {
    .photo {
        width: 90px;
        height: 120px;
    }

    .photo-section {
        height: 300px;
    }
}
.container {
    padding: 30px;
    animation: fadeIn 2s ease;
}


/* كتابة متحركة */
.lyrics {
    font-size: 22px;
    margin-top: 15px;
    height: 30px;
}

/* slideshow */
.slideshow {
    position: relative;
    width: 260px;
    height: 260px;
    margin: 25px auto;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 20px;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
}

.active {
    opacity: 1;

}
</style>
</head>
